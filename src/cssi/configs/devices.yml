common_9id.devices.aerotechHexapod:
- name: hexapod1
  prefix: "9idAerotech:HP1:"
  labels: ["hexapod", "motors", "baseline"]
  x: "m7"
  y: "m8"
  z: "m9"
  ax: "m10"
  ay: "m11"
  az: "m12"
- name: hexapod2
  prefix: "9idAerotech2:HP2:"
  labels: ["hexapod", "motors", "baseline"]
  x: "m7"
  y: "m8"
  z: "m9"
  ax: "m10"
  ay: "m11"
  az: "m12"

ophyd.EpicsSignal:
- {name: "mux_2_sel_signal", read_pv: "9iddMZds:SG:MUX-2_SEL_Signal"}
- {name: "xpbm1_sum", read_pv: "9idT4U:BD3:BPM:SumAll:MeanValue_RBV", labels: ["metadataPV"]}
- {name: "xpbm1_xpos", read_pv: "9idT4U:BD3:BPM:PosX:MeanValue_RBV", labels: ["metadataPV"]}
- {name: "xpbm1_ypos", read_pv: "9idT4U:BD3:BPM:PosY:MeanValue_RBV", labels: ["metadataPV"]}
- {name: "xpbm2_sum", read_pv: "9idT4U:BD5:BPM:SumAll:MeanValue_RBV", labels: ["metadataPV"]}
- {name: "xpbm2_xpos", read_pv: "9idT4U:BD5:BPM:PosX:MeanValue_RBV", labels: ["metadataPV"]}
- {name: "xpbm2_ypos", read_pv: "9idT4U:BD5:BPM:PosY:MeanValue_RBV", labels: ["metadataPV"]}

