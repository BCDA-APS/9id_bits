# Guarneri-style device YAML configuration

apsbits.utils.sim_creator.predefined_device:
- {creator: ophyd.sim.motor, name: sim_motor_cssi}
- {creator: ophyd.sim.noisy_det, name: sim_det_cssi}

ophyd.EpicsMotor:
