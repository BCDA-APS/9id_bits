- {name: "uscope_y",      prefix: "9idCSSI:CR9D1M2:m9", labels: ["motors", "baseline"]}
- {name: "uscope_z",      prefix: "9idCSSI:CR9D1M2:m6", labels: ["motor", "baseline"]}
- {name: "uscope_focus",  prefix: "9idCSSI:CR9D1M2:m10", labels: ["motor", "baseline"]}
- {name: "cssi_flyz",      prefix: "9idANT95:aero:c0:m1", labels: ["motor", "baseline"]}
- {name: "cssi_theta_x2",      prefix: "9idCSSI:mcs2-01:m1", labels: ["motor", "baseline"]}
- {name: "cssi_Z4",      prefix: "9idCSSI:mcs2-01:m2", labels: ["motor", "baseline"]}
- {name: "cssi_Y4",      prefix: "9idCSSI:mcs2-01:m3", labels: ["motor", "baseline"]}
- {name: "cssi_X4",      prefix: "9idCSSI:mcs2-01:m4", labels: ["motor", "baseline"]}
- {name: "kohzu_linear",   prefix: "9idCSSI:CR9D1M2:m1", labels: ["motor", "baseline"]}
- {name: "kohzu_rotate",    prefix: "9idCSSI:CR9D1M2:m2", labels: ["motor", "baseline"]}
- {name: "eiger_x",    prefix: "9idGT:m11", labels: ["motor", "baseline"]}
- {name: "eiger_y",    prefix: "9idGT:m12", labels: ["motor", "baseline"]}
- {name: "carriage_hor_bs_y",    prefix: "9idGT:m1", labels: ["motor", "baseline"]}
- {name: "carriage_bs_bot",    prefix: "9idGT:mcs2-02:m3", labels: ["motor", "baseline"]}
- {name: "gixs_sam_x", prefix: "9idd:CR9D4M1:m3", labels: ["motor", "baseline"]}

